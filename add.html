<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Add Asset | CoCo Hua Hin 88 V1.8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #2D5A27; --brand-light: #F3F6F3; --accent: #CEA86C; }
    body { font-family: 'Sarabun', 'Montserrat', sans-serif; background: #F8FAF8; color: #1A3017; margin: 0; padding: 0; }
    .content-wrapper { padding: 20px 20px 200px; max-width: 1240px; margin: 0 auto; }
    
    .tab-bar { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; padding: 0 10px; }
    .tab-btn { padding: 1rem 0; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #999; cursor: pointer; position: relative; background: none; border: none; transition: 0.3s; }
    .tab-btn.active { color: var(--brand); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--brand); border-radius: 10px; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .input-card { background: white; border: 1px solid rgba(45,90,39,0.1); padding: 2.2rem; border-radius: 2.2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
    .field-label { font-size: 11px; font-weight: 800; color: #6B7A68; text-transform: uppercase; margin-bottom: 0.6rem; display: block; letter-spacing: 0.5px; }
    .field-label span { color: var(--brand); font-size: 13px; margin-left: 8px; font-weight: 700; border-left: 2px solid #ddd; padding-left: 10px; }
    .field-input { width: 100%; background: var(--brand-light); border: 1.5px solid transparent; border-radius: 1rem; padding: 1rem; font-size: 15px; outline: none; transition: 0.3s; }
    .field-input:focus { border-color: var(--brand); background: white; }

    .thumb-stage { position: relative; width: 100%; aspect-ratio: 16/10; border-radius: 1.5rem; overflow: hidden; border: 2px dashed #ddd; background: #fdfdfd; margin-bottom: 1rem; }
    .img-tile { position: relative; aspect-ratio: 1; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; background: #fff; }
    .img-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,0.9); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 10px; }
    
    .mini-status { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--accent); display: none; margin-top: 5px; }
    .mini-status.active { display: flex; align-items: center; gap: 5px; }

    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid #eee; padding: 25px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: var(--brand); color: white; width: 100%; max-width: 800px; height: 70px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 20px; letter-spacing: 2px; }
    
    .pdf-row { display: flex; align-items: center; gap: 12px; background: var(--brand-light); padding: 15px; border-radius: 1.2rem; margin-bottom: 10px; }
    .btn-pdf-action { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <input type="hidden" id="HP_ID" value="MASTER_ENTRY">
  <input type="hidden" id="Listing_Type" value="Sale">
  <input type="hidden" id="Type" value="Pool Villa">
  <input type="hidden" id="Project_Name" value="CoCo Hua Hin 88">

  <div class="content-wrapper">
    <div class="bg-[#2D5A27] rounded-[2.5rem] p-10 text-white flex justify-between items-center mb-8 shadow-2xl relative overflow-hidden">
      <div class="relative z-10">
        <p class="text-white/60 font-800 uppercase tracking-widest text-[10px] mb-2">CoCo Hua Hin 88 | Enrollment</p>
        <h1 class="text-4xl font-800 tracking-tighter italic Sarabun uppercase">ENROLL ASSET</h1>
      </div>
      <i class="fas fa-leaf absolute right-[-20px] bottom-[-20px] text-white/5 text-9xl"></i>
    </div>

    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">1. Visual & Documents</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">2. Asset Specifications</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="input-card">
          <span class="field-label">Main Image <span>รูปภาพหน้าปก</span></span>
          <div id="thumbPreview" class="thumb-stage flex items-center justify-center overflow-hidden"><i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i></div>
          <button onclick="document.getElementById('file_thumb').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-800 text-xs uppercase">Upload Cover Image</button>
          <div id="status_thumb" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing to Firebase...</div>
          <input type="file" id="file_thumb" class="hidden" accept="image/*" onchange="handleUpload(this, 'thumb')">
        </div>
        <div class="input-card">
          <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
          <div id="galleryPreview" class="h-48 bg-slate-50 rounded-2xl p-3 grid grid-cols-4 gap-2 overflow-y-auto mb-3"></div>
          <button onclick="document.getElementById('file_gallery').click()" class="w-full py-4 bg-purple-600 text-white rounded-xl font-800 text-xs uppercase">Add Album Photos</button>
          <div id="status_album" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Processing...</div>
          <input type="file" id="file_gallery" class="hidden" multiple accept="image/*" onchange="handleUpload(this, 'album')">
        </div>
      </div>

      <div class="input-card">
        <span class="field-label">Master Documents (PDF) <span>จัดการไฟล์เอกสาร</span></span>
        <div class="space-y-3 mt-4">
          <div class="pdf-row">
            <div class="flex-1"><span class="text-[10px] font-800 block text-slate-400 uppercase">Floor Plan</span><span id="txt-FloorPlan_PDF" class="text-[11px] font-700 text-[#2D5A27] truncate italic">No file selected</span></div>
            <div class="flex gap-2">
              <button onclick="viewFile('FloorPlan_PDF')" id="view-FloorPlan_PDF" class="btn-pdf-action bg-white text-emerald-600 border border-emerald-100 hidden"><i class="fas fa-eye"></i></button>
              <button onclick="document.getElementById('f_floor').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
            </div>
            <input type="file" id="f_floor" class="hidden" accept=".pdf" onchange="handleUpload(this, 'floor', 'FloorPlan_PDF')">
          </div>
          <div class="pdf-row">
            <div class="flex-1"><span class="text-[10px] font-800 block text-slate-400 uppercase">Customer Brochure</span><span id="txt-Customer_PDF" class="text-[11px] font-700 text-[#2D5A27] truncate italic">No file selected</span></div>
            <div class="flex gap-2">
              <button onclick="viewFile('Customer_PDF')" id="view-Customer_PDF" class="btn-pdf-action bg-white text-emerald-600 border border-emerald-100 hidden"><i class="fas fa-eye"></i></button>
              <button onclick="document.getElementById('f_customer').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
            </div>
            <input type="file" id="f_customer" class="hidden" accept=".pdf" onchange="handleUpload(this, 'customer', 'Customer_PDF')">
          </div>
          <div class="pdf-row">
            <div class="flex-1"><span class="text-[10px] font-800 block text-slate-400 uppercase">Agent Fact Sheet</span><span id="txt-Agent_PDF" class="text-[11px] font-700 text-[#2D5A27] truncate italic">No file selected</span></div>
            <div class="flex gap-2">
              <button onclick="viewFile('Agent_PDF')" id="view-Agent_PDF" class="btn-pdf-action bg-white text-emerald-600 border border-emerald-100 hidden"><i class="fas fa-eye"></i></button>
              <button onclick="document.getElementById('f_agent').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
            </div>
            <input type="file" id="f_agent" class="hidden" accept=".pdf" onchange="handleUpload(this, 'agent', 'Agent_PDF')">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-6">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-8">
        <div><label class="field-label">5. Plot Reference <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input" placeholder="e.g. M17"></div>
        <div><label class="field-label">6. Sales Status <span>สถานะขาย</span></label><select id="Status" class="field-input dynamic-opt"></select></div>

        <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-8 p-8 rounded-[2.5rem] bg-[#2D5A27]/5 border-2 border-[#2D5A27]/10">
          <div><label class="field-label !text-[#2D5A27]">7. Sale Price (THB)</label><input type="number" id="Sale_Price" class="field-input !bg-white font-800" oninput="runCalc()"></div>
          <div><label class="field-label">8. Living Area (m2)</label><input type="number" id="Living_Area_sq_m" class="field-input !bg-white" oninput="runCalc()"></div>
          <div><label class="field-label">9. Price per m2</label><input type="number" id="Price_sq_m" class="field-input" readonly value="0"></div>
          <div class="col-span-full border-t border-[#2D5A27]/10 pt-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div><label class="field-label font-800">10. Common Fee Rate</label><input type="number" id="Common_Fee_Rate" class="field-input !bg-white" oninput="runCalc()" placeholder="e.g. 4"></div>
            <div><label class="field-label">11. Monthly Fee</label><input id="Monthly_Common_Fee" class="field-input" readonly value="0"></div>
            <div><label class="field-label">12. Yearly Fee</label><input id="Common_Fee_Yearly" class="field-input" readonly value="0"></div>
          </div>
        </div>

        <div><label class="field-label">13. Land Area (m2)</label><input type="number" id="Land_Area_sq_m" class="field-input"></div>
        <div><label class="field-label">14. Land Area (sq.w)</label><input type="number" id="Land_Area_sq_w" class="field-input"></div>
        <div><label class="field-label">15. Furnishing</label><select id="Furnishing" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">16. District</label><select id="District" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">17. Sub-District</label><select id="SubDistrict" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">18. Zone</label><select id="Zone" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">19. Bedrooms</label><select id="Bedrooms" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">20. Bathrooms</label><select id="Bathrooms" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">21. Parking Spaces</label><select id="Parking" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">22. Kitchen Type</label><select id="Kitchen_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">23. Direction Facing</label><select id="Direction" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">24. Electricity</label><select id="Electricity" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">25. Pool Size</label><input id="Pool_Size" class="field-input"></div>
        <div><label class="field-label">26. Pool Depth</label><input id="Pool_Depth" class="field-input"></div>
        <div><label class="field-label">27. Pool System</label><select id="Pool_System" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">28. View Type</label><select id="View_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">29. Water Source</label><select id="Water_Source" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">30. Extras</label><select id="Extras" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">31. Ownership</label><select id="Ownership_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">32. Title Deed</label><select id="Land_Title_Deed_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">33. Transfer Exp.</label><input id="Transfer_Expenses" class="field-input"></div>
        <div><label class="field-label">34. Badge Type</label><select id="Badge" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">35. Build Stage</label><select id="Build_Stage" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">36. GPS Coordinates</label><input id="Coordinates" class="field-input"></div>
        <div class="col-span-full"><label class="field-label">37. Description</label><textarea id="Description" rows="4" class="field-input"></textarea></div>
        <div class="col-span-full bg-[#F3F6F3] p-6 rounded-2xl border-2 border-dashed border-[#2D5A27]/20 mt-4">
          <label class="field-label !text-[#2D5A27]">38. Visibility</label>
          <select id="System_Status" class="field-input !bg-white !font-700 dynamic-opt"></select>
        </div>
      </div>
    </div>
  </div>

  <input type="hidden" id="Thumbnail_Image">
  <input type="hidden" id="Album_Image">
  <input type="hidden" id="FloorPlan_PDF">
  <input type="hidden" id="Customer_PDF">
  <input type="hidden" id="Agent_PDF">

  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-2xl">PUBLISH ASSET</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let gallery = [], thumbUrl = "", pdfData = {}, currentHpId = "MASTER_ENTRY";

    async function init() {
      try {
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getMetadata' }) })).json();
        const meta = res.data;
        document.querySelectorAll('select.dynamic-opt').forEach(el => {
          const opts = meta[el.id] || [];
          if(opts.length > 0) el.innerHTML = `<option value="">-- Select --</option>` + opts.map(v => `<option value="${v}">${v}</option>`).join('');
        });
      } catch (e) { console.error("Init Error"); }
    }

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas'); const MAX_WIDTH = 1200;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
          };
        };
      });
    }

    async function handleUpload(input, target, fieldId) {
      if(!input.files.length) return;
      const statusId = target === 'album' ? 'status_album' : 'status_thumb';
      if(document.getElementById(statusId)) document.getElementById(statusId).classList.add('active');

      for(let f of Array.from(input.files)) {
        const base64 = f.type.includes("image") ? await compressImage(f) : await new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); });
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode:'uploadFile', target, hpId: currentHpId, data: base64, type: f.type, name: f.name }) })).json();
        if(res.ok) {
          if(target === 'thumb') { thumbUrl = res.url; renderMainThumb(res.url); }
          else if(target === 'album') { gallery.push(res.url); renderGallery(); }
          else { pdfData[fieldId] = res.url; syncPdfUI(fieldId, res.url, f.name); }
        }
      }
      if(document.getElementById(statusId)) document.getElementById(statusId).classList.remove('active');
    }

    function renderMainThumb(url) {
      const box = document.getElementById('thumbPreview');
      box.innerHTML = url ? `<div class="img-x" onclick="thumbUrl='';renderMainThumb('')">✕</div><img src="${url}" class="w-full h-full object-cover">` : `<i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i>`;
      document.getElementById('Thumbnail_Image').value = url;
    }

    function renderGallery() {
      const box = document.getElementById('galleryPreview');
      box.innerHTML = gallery.map((url, i) => `<div class="img-tile"><div class="img-x" onclick="gallery.splice(${i},1);renderGallery()">✕</div><img src="${url}" class="w-full h-full object-cover"></div>`).join('');
      document.getElementById('Album_Image').value = gallery.join(',');
    }

    function syncPdfUI(id, url, name) {
      const txt = document.getElementById('txt-'+id); const view = document.getElementById('view-'+id);
      if (url) { txt.innerText = name || "Attached ✅"; if(view) view.classList.remove('hidden'); document.getElementById(id).value = url; }
    }

    function runCalc() {
      const price = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const area = parseFloat(document.getElementById('Living_Area_sq_m').value) || 0;
      const rate = parseFloat(document.getElementById('Common_Fee_Rate').value) || 0;
      if(area > 0) {
        document.getElementById('Price_sq_m').value = Math.round(price / area);
        const monthly = Math.round(area * rate);
        document.getElementById('Monthly_Common_Fee').value = monthly;
        document.getElementById('Common_Fee_Yearly').value = monthly * 12;
      }
    }

    async function saveData() {
      if(!confirm("Submit Asset to Vault?")) return;
      document.getElementById('btn_save').innerText = "PUBLISHING...";
      const p = { mode: "addUnit" };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) p[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(p) })).json();
      if(res.ok) { alert("SUCCESS! ✅"); location.reload(); }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }
    function viewFile(id) { if(pdfData[id]) window.open(pdfData[id], '_blank'); }
    window.onload = init;
  </script>
</body>
</html>
