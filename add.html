<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Enroll Asset | CoCo Hua Hin 88 V1.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #2D5A27; --brand-light: #F3F6F3; --accent: #CEA86C; }
    body { font-family: 'Sarabun', 'Montserrat', sans-serif; background: #F8FAF8; color: #1A3017; margin: 0; padding: 0; }
    .content-wrapper { padding: 20px 20px 200px; max-width: 1240px; margin: 0 auto; }
    
    .tab-bar { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
    .tab-btn { padding: 1rem 0; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #999; cursor: pointer; position: relative; background: none; border: none; transition: 0.3s; }
    .tab-btn.active { color: var(--brand); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--brand); border-radius: 10px; }
    
    .input-card { background: white; border: 1px solid rgba(45,90,39,0.1); padding: 2.2rem; border-radius: 2.2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
    .field-label { font-size: 11px; font-weight: 800; color: #6B7A68; text-transform: uppercase; margin-bottom: 0.6rem; display: block; letter-spacing: 0.5px; }
    .field-label span { color: var(--brand); font-size: 13px; margin-left: 8px; font-weight: 700; border-left: 2px solid #ddd; padding-left: 10px; }
    .field-input { width: 100%; background: var(--brand-light); border: 1.5px solid transparent; border-radius: 1rem; padding: 1rem; font-size: 15px; outline: none; transition: 0.3s; -webkit-appearance: none; }
    .field-input:focus { border-color: var(--brand); background: white; box-shadow: 0 0 0 4px rgba(45,90,39,0.05); }

    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-top: 1px solid #eee; padding: 25px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: var(--brand); color: white; width: 100%; max-width: 800px; height: 70px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 20px; letter-spacing: 2px; }
    
    .loading-shimmer { background: linear-gradient(90deg, #f0f2f0 25%, #e0e4e0 50%, #f0f2f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="bg-[#2D5A27] rounded-[2.5rem] p-10 text-white flex justify-between items-center mb-8 shadow-2xl relative overflow-hidden">
      <div class="relative z-10"><p class="text-white/60 font-800 uppercase tracking-widest text-[10px] mb-2">CoCo Hua Hin 88 | System V1.3</p><h1 class="text-4xl font-800 tracking-tighter italic Sarabun uppercase">ADD NEW ASSET</h1></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active">Asset Specifications (38 Items)</button>
    </div>

    <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-8">
      <div><label class="field-label">1. HP_ID <span>รหัสทรัพย์สิน</span></label><input id="HP_ID" class="field-input font-800" readonly value="PENDING..."></div>
      
      <div><label class="field-label">2. Listing Type <span>ประกาศ</span></label><select id="Listing_Type" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">3. Asset Category <span>ประเภท</span></label><select id="Type" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">4. Project Name <span>ชื่อโครงการ</span></label><select id="Project_Name" class="field-input dynamic-opt loading-shimmer"></select></div>
      
      <div><label class="field-label">5. Plot Reference <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input" placeholder="e.g. A1"></div>
      <div><label class="field-label">6. Sales Status <span>สถานะขาย</span></label><select id="Status" class="field-input dynamic-opt loading-shimmer"></select></div>

      <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-8 p-8 rounded-[2.5rem] bg-[#2D5A27]/5 border-2 border-[#2D5A27]/10">
        <div><label class="field-label !text-[#2D5A27]">7. Sale Price (THB)</label><input type="number" id="Sale_Price" class="field-input !bg-white font-800" oninput="runCalculations()"></div>
        <div><label class="field-label">8. Living Area (m²)</label><input type="number" id="Living_Area_sq_m" class="field-input !bg-white" oninput="runCalculations()"></div>
        <div><label class="field-label">9. Price per m²</label><input type="number" id="Price_sq_m" class="field-input" readonly value="0"></div>
      </div>

      <div><label class="field-label">15. Furnishing</label><select id="Furnishing" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">16. District</label><select id="District" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">17. Sub-District</label><select id="SubDistrict" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">18. Zone</label><select id="Zone" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">22. Kitchen</label><select id="Kitchen_Type" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">23. Direction</label><select id="Direction" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">27. Pool System</label><select id="Pool_System" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">31. Ownership</label><select id="Ownership_Type" class="field-input dynamic-opt loading-shimmer"></select></div>
      <div><label class="field-label">38. Visibility Status</label><select id="System_Status" class="field-input dynamic-opt loading-shimmer"></select></div>
    </div>
  </div>

  <div class="save-bar"><button onclick="saveData()" class="btn-update shadow-2xl">SAVE TO MASTER SYSTEM</button></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";

    // 1. แก้ไขปัญหา Dropdown ว่าง: เพิ่มฟังก์ชันดึง Metadata พร้อมระบบป้องกัน Error
    async function fetchMetadata() {
      try {
        const response = await fetch(`${SCRIPT_URL}?mode=getMetadata`);
        const result = await response.json();
        
        if(result.status === "success") {
          const meta = result.data;
          // รายชื่อ ID ของ Select ที่ต้องเติมข้อมูล
          const dropdownIds = ["Listing_Type", "Type", "Project_Name", "Status", "Furnishing", "District", "SubDistrict", "Zone", "Ownership_Type", "System_Status", "Direction", "Pool_System", "Kitchen_Type"];
          
          dropdownIds.forEach(id => {
            const el = document.getElementById(id);
            if(el && meta[id]) {
              el.classList.remove('loading-shimmer');
              let options = `<option value="">-- Select ${id.replace('_',' ')} --</option>`;
              meta[id].forEach(val => {
                options += `<option value="${val}">${val}</option>`;
              });
              el.innerHTML = options;
            }
          });

          // Lock โครงการเป็น CoCo โดยอัตโนมัติ
          const projEl = document.getElementById('Project_Name');
          if(projEl) projEl.value = "CoCo Hua Hin 88";
        }
      } catch (e) {
        console.error("Metadata Load Failed:", e);
        // ถ้าโหลดไม่สำเร็จ ให้ลบ Class Loading ออกเพื่อให้พิมพ์เองได้ (Fallback)
        document.querySelectorAll('.dynamic-opt').forEach(el => el.classList.remove('loading-shimmer'));
      }
    }

    function runCalculations() {
      const price = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const area = parseFloat(document.getElementById('Living_Area_sq_m').value) || 0;
      if(area > 0) document.getElementById('Price_sq_m').value = Math.round(price / area);
    }

    async function saveData() {
      const btn = document.querySelector('.btn-update');
      btn.innerText = "SAVING..."; btn.disabled = true;
      
      const payload = { mode: "addUnit" };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) payload[el.id] = el.value; });

      try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if(data.ok) { alert("Asset Enrolled Successfully!"); location.reload(); }
      } catch (e) { alert("Save Error. Please check connection."); }
      
      btn.innerText = "SAVE TO MASTER SYSTEM"; btn.disabled = false;
    }

    window.onload = fetchMetadata;
  </script>
</body>
</html>
