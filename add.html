<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Add Asset | CoCo Hua Hin 88</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --brand: #2D5A27;        /* สีเขียว Coco */
      --brand-light: #F3F6F3;  /* พื้นหลังอ่อน */
      --accent: #CEA86C;       /* สีทอง Coco */
    }
    body { font-family: 'Sarabun', 'Montserrat', sans-serif; background: #F8FAF8; color: #1A3017; margin: 0; padding: 0; }
    .content-wrapper { padding: 20px 20px 200px; max-width: 1240px; margin: 0 auto; }
    
    /* Tab System */
    .tab-bar { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
    .tab-btn { padding: 1rem 0; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #999; cursor: pointer; position: relative; background: none; border: none; transition: 0.3s; }
    .tab-btn.active { color: var(--brand); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--brand); border-radius: 10px; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .input-card { background: white; border: 1px solid rgba(45,90,39,0.1); padding: 2.2rem; border-radius: 2.2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
    .field-label { font-size: 11px; font-weight: 800; color: #6B7A68; text-transform: uppercase; margin-bottom: 0.6rem; display: block; letter-spacing: 0.5px; }
    .field-label span { color: var(--brand); font-size: 13px; margin-left: 8px; font-weight: 700; border-left: 2px solid #ddd; padding-left: 10px; }
    
    .field-input { width: 100%; background: var(--brand-light); border: 1.5px solid transparent; border-radius: 1rem; padding: 1rem; color: #1A3017; font-size: 15px; outline: none; transition: 0.3s; }
    .field-input:focus { border-color: var(--brand); background: white; box-shadow: 0 0 0 4px rgba(45,90,39,0.05); }
    .field-input[readonly] { background: #f0f2f0; color: var(--brand); font-weight: 700; }

    /* Visual Placeholders */
    .thumb-stage { position: relative; width: 100%; aspect-ratio: 16/10; border-radius: 1.5rem; overflow: hidden; border: 2px dashed #ddd; background: #fdfdfd; margin-bottom: 1rem; }
    .img-tile { position: relative; aspect-ratio: 1; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; background: #fff; }
    .img-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,0.9); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 10px; }
    
    .pdf-row { display: flex; align-items: center; gap: 15px; background: var(--brand-light); padding: 15px; border-radius: 1.2rem; margin-bottom: 10px; border: 1px solid rgba(45,90,39,0.03); }
    .pdf-icon { width: 45px; height: 45px; background: #fee2e2; color: #ef4444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .btn-pdf-action { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }

    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-top: 1px solid #eee; padding: 25px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: var(--brand); color: white; width: 100%; max-width: 800px; height: 70px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 20px; letter-spacing: 2px; }
    
    .mini-status { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--accent); display: none; margin-top: 5px; }
    .mini-status.active { display: flex; align-items: center; gap: 5px; }
    
    .upload-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="upLoading" class="upload-overlay">
    <div class="border-4 border-[#eee] border-t-[#2D5A27] rounded-full w-10 h-10 animate-spin mb-4"></div>
    <div id="loadText" class="text-xs font-800 text-[#2D5A27] tracking-widest uppercase">Syncing to Master Vault...</div>
  </div>

  <div class="content-wrapper">
    <div class="bg-[#2D5A27] rounded-[2.5rem] p-10 text-white flex justify-between items-center mb-8 shadow-2xl relative overflow-hidden">
      <div class="relative z-10">
        <p class="text-white/60 font-800 uppercase tracking-widest text-[10px] mb-2">CoCo Hua Hin 88 | Enrollment Suite</p>
        <h1 class="text-4xl font-800 tracking-tighter italic Sarabun uppercase">ADD NEW ASSET</h1>
      </div>
      <i class="fas fa-leaf absolute right-[-20px] bottom-[-20px] text-white/5 text-9xl"></i>
    </div>

    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications (36 Items)</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="input-card">
          <span class="field-label">Main Image <span>รูปภาพหน้าปก</span></span>
          <div id="thumbPreview" class="thumb-stage flex items-center justify-center overflow-hidden">
            <i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i>
          </div>
          <button onclick="document.getElementById('file_thumb').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-800 text-xs">UPLOAD COVER</button>
          <div id="status_thumb" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Processing...</div>
          <input type="file" id="file_thumb" class="hidden" accept="image/*" onchange="handleUpload(this, 'thumb')">
          <input type="hidden" id="Thumbnail_Image">
        </div>
        
        <div class="input-card">
          <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
          <div id="galleryPreview" class="h-48 bg-slate-50 rounded-2xl p-3 grid grid-cols-4 gap-2 overflow-y-auto mb-3"></div>
          <button onclick="document.getElementById('file_gallery').click()" class="w-full py-4 bg-purple-600 text-white rounded-xl font-800 text-xs">ADD VISUALS</button>
          <div id="status_album" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Processing...</div>
          <input type="file" id="file_gallery" class="hidden" multiple accept="image/*" onchange="handleUpload(this, 'album')">
          <input type="hidden" id="Album_Image">
        </div>
      </div>

      <div class="input-card">
        <span class="field-label">Asset Documents (PDF) <span>จัดการไฟล์เอกสาร</span></span>
        <div class="space-y-3 mt-4">
          <div class="pdf-row">
            <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="flex-1">
              <span class="text-[10px] font-800 block text-slate-400 uppercase">Floor Plan</span>
              <span id="txt-FloorPlan_PDF" class="text-[11px] font-700 text-[#2D5A27] truncate italic">No file selected</span>
            </div>
            <div class="flex gap-2">
              <button onclick="viewFile('FloorPlan_PDF')" id="view-FloorPlan_PDF" class="btn-pdf-action bg-white text-emerald-600 border border-emerald-100 hidden"><i class="fas fa-eye"></i></button>
              <button onclick="document.getElementById('f_floor').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
            </div>
            <input type="file" id="f_floor" class="hidden" accept=".pdf" onchange="handleUpload(this, 'floor', 'FloorPlan_PDF')">
            <input type="hidden" id="FloorPlan_PDF">
          </div>
          <div class="pdf-row">
            <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="flex-1">
              <span class="text-[10px] font-800 block text-slate-400 uppercase">Customer Brochure</span>
              <span id="txt-Sales_Gallery" class="text-[11px] font-700 text-[#2D5A27] truncate italic">No file selected</span>
            </div>
            <div class="flex gap-2">
              <button onclick="viewFile('Sales_Gallery')" id="view-Sales_Gallery" class="btn-pdf-action bg-white text-emerald-600 border border-emerald-100 hidden"><i class="fas fa-eye"></i></button>
              <button onclick="document.getElementById('f_customer').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
            </div>
            <input type="file" id="f_customer" class="hidden" accept=".pdf" onchange="handleUpload(this, 'customer', 'Sales_Gallery')">
            <input type="hidden" id="Sales_Gallery">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-6">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-8">
        <div><label class="field-label">1. HP_ID <span>รหัสทรัพย์สิน</span></label><input id="HP_ID" class="field-input font-800" readonly placeholder="Auto-generated"></div>
        <div><label class="field-label">2. Listing Type <span>ประกาศ</span></label><select id="Listing_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">3. Asset Category <span>ประเภททรัพย์สิน</span></label><select id="Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">4. Project Name <span>ชื่อโครงการ</span></label><select id="Project_Name" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">5. Plot Reference <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input" placeholder="เช่น M17"></div>
        <div><label class="field-label">6. Sales Status <span>สถานะขาย</span></label><select id="Status" class="field-input dynamic-opt"></select></div>

        <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-8 p-8 rounded-[2.5rem] bg-[#2D5A27]/5 border-2 border-[#2D5A27]/10 shadow-inner">
          <div><label class="field-label !text-[#2D5A27]">7. Sale Price (THB) <span>ราคาขายสุทธิ</span></label><input type="number" id="Sale_Price" class="field-input !bg-white font-800" oninput="runCalculations()"></div>
          <div><label class="field-label">8. Living Area (m²) <span>พื้นที่ใช้สอย</span></label><input type="number" id="Living_Area_sq_m" class="field-input !bg-white" oninput="runCalculations()"></div>
          <div><label class="field-label">9. Price per m² <span>ราคาต่อ ตร.ม.</span></label><input type="number" id="Price_sq_m" class="field-input" readonly value="0"></div>
          
          <div class="col-span-full border-t border-[#2D5A27]/10 pt-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div><label class="field-label font-800">10. Common Fee Rate <span>ส่วนกลาง (/m²)</span></label><input type="number" id="Common_Fee_Rate" class="field-input !bg-white" oninput="runCalculations()" placeholder="เช่น 4"></div>
          </div>
        </div>

        <div><label class="field-label">11. Land Area (m²) <span>พื้นที่ดิน (ม²)</span></label><input type="number" id="Land_Area_sq_m" class="field-input"></div>
        <div><label class="field-label">12. Land Area (sq.w) <span>พื้นที่ดิน (ตร.ว.)</span></label><input type="number" id="Land_Area_sq_w" class="field-input"></div>
        <div><label class="field-label">13. Furnishing <span>การตกแต่ง</span></label><select id="Furnishing" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">14. District <span>อำเภอ</span></label><select id="District" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">15. Sub-District <span>ตำบล</span></label><select id="SubDistrict" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">16. Zone <span>โซน</span></label><select id="Zone" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">17. Bedrooms <span>ห้องนอน</span></label><input type="number" id="Bedrooms" class="field-input"></div>
        <div><label class="field-label">18. Bathrooms <span>ห้องน้ำ</span></label><input type="number" id="Bathrooms" class="field-input"></div>
        <div><label class="field-label">19. Parking Spaces <span>ที่จอดรถ</span></label><input type="number" id="Parking" class="field-input"></div>
        <div><label class="field-label">20. Kitchen Style <span>สไตล์ครัว</span></label><select id="Kitchen_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">21. Direction Facing <span>ทิศหน้าบ้าน</span></label><select id="Direction" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">22. Electricity <span>ระบบไฟฟ้า</span></label><select id="Electricity" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">23. Pool Size <span>ขนาดสระ</span></label><input id="Pool_Size" class="field-input"></div>
        <div><label class="field-label">24. Pool Depth <span>ความลึกสระ</span></label><input id="Pool_Depth" class="field-input"></div>
        <div><label class="field-label">25. Pool System <span>ระบบสระ</span></label><select id="Pool_System" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">26. View Profile <span>วิว</span></label><select id="View_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">27. Water Source <span>แหล่งน้ำ</span></label><select id="Water_Source" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">28. Extras <span>จุดเด่นเพิ่มเติม</span></label><select id="Extras" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">29. Ownership <span>การถือครอง</span></label><select id="Ownership_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">30. Land Title Deed <span>ประเภทโฉนด</span></label><select id="Land_Title_Deed_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">31. Transfer Exp. <span>ค่าใช้จ่ายวันโอน</span></label><input id="Transfer_Expenses" class="field-input"></div>
        <div><label class="field-label">32. Marketing Badge <span>ป้ายกำกับ</span></label><select id="Badge" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">33. Build Stage <span>ก่อสร้าง</span></label><select id="Build_Stage" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">34. GPS Coordinates <span>พิกัด</span></label><input id="Coordinates" class="field-input"></div>
        <div class="col-span-full"><label class="field-label">35. Property Description <span>คำบรรยายรายละเอียด</span></label><textarea id="Description" rows="4" class="field-input"></textarea></div>
        <div class="col-span-full bg-[#F3F6F3] p-6 rounded-[1.5rem] border-2 border-dashed border-[#2D5A27]/20 mt-4">
          <label class="field-label !text-[#2D5A27]">36. System Visibility <span>สถานะในระบบ</span></label>
          <select id="System_Status" class="field-input !bg-white !font-700 dynamic-opt"></select>
        </div>
      </div>
    </div>
  </div>

  <div class="save-bar">
    <button onclick="saveData()" class="btn-update shadow-2xl">ENROLL TO MASTER VAULT</button>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let gallery = [], thumbUrl = "", pdfData = {};

    async function init() {
      showLoading("FETCHING SETTINGS...");
      try {
        const metaRes = await fetch(`${API}?mode=getMetadata`);
        const meta = (await metaRes.json()).data;
        const dropdowns = ["Listing_Type", "Type", "Project_Name", "Status", "Furnishing", "District", "SubDistrict", "Zone", "Ownership_Type", "Land_Title_Deed_Type", "System_Status", "Badge", "Build_Stage", "Direction", "Electricity", "Pool_System", "View_Type", "Water_Source", "Extras", "Kitchen_Type"];
        dropdowns.forEach(f => {
          const el = document.getElementById(f);
          if(el && meta[f]) el.innerHTML = `<option value="">-- Select --</option>` + meta[f].map(v => `<option value="${v}">${v}</option>`).join('');
        });
        // Set Default Project for Coco
        if(document.getElementById('Project_Name')) document.getElementById('Project_Name').value = "CoCo Hua Hin 88";
      } catch (e) { console.error(e); }
      hideLoading();
    }

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1200;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
          };
        };
      });
    }

    async function handleUpload(input, target, fieldId) {
      if(!input.files.length) return;
      showLoading("PROCESSING MEDIA...");
      for(let f of Array.from(input.files)) {
        const base64 = f.type.includes("image") ? await compressImage(f) : await new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result.split(',')[1]); });
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode:'uploadFile', target, hpId: 'MASTER_ENTRY', data: base64, type: f.type, name: f.name }) })).json();
        if(res.ok) {
          if(target === 'thumb') { thumbUrl = res.url; renderMainThumb(res.url); }
          else if(target === 'album') { gallery.push(res.url); renderGallery(); }
          else { pdfData[fieldId] = res.url; syncPdfUI(fieldId, res.url, f.name); }
        }
      }
      hideLoading();
    }

    function renderMainThumb(url) {
      const box = document.getElementById('thumbPreview');
      box.innerHTML = `<div class="img-x" onclick="deleteMainThumb()">✕</div><img src="${url}" class="w-full h-full object-cover">`;
      document.getElementById('Thumbnail_Image').value = url;
    }

    function deleteMainThumb() { 
      document.getElementById('thumbPreview').innerHTML = `<i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i>`;
      thumbUrl = ""; document.getElementById('Thumbnail_Image').value = "";
    }

    function renderGallery() {
      const box = document.getElementById('galleryPreview');
      box.innerHTML = gallery.map((url, i) => `<div class="img-tile"><div class="img-x" onclick="gallery.splice(${i},1);renderGallery()">✕</div><img src="${url}" class="w-full h-full object-cover"></div>`).join('');
      document.getElementById('Album_Image').value = gallery.join(',');
    }

    function syncPdfUI(id, url, name) {
      const txt = document.getElementById('txt-'+id); const view = document.getElementById('view-'+id);
      if (url) { txt.innerText = name || "Attached ✅"; view.classList.remove('hidden'); }
    }

    function runCalculations() {
      const price = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const area = parseFloat(document.getElementById('Living_Area_sq_m').value) || 0;
      if(area > 0) document.getElementById('Price_sq_m').value = Math.round(price / area);
    }

    async function saveData() {
      if(!confirm("Enroll this entry to Master Vault?")) return;
      showLoading("PUBLISHING ASSET...");
      const p = { mode: "addUnit", Thumbnail_Image: thumbUrl, Album_Image: gallery.join(','), ...pdfData };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) p[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(p) })).json();
      if(res.ok) { alert(`SUCCESS! Asset ID: ${res.newId}`); location.href='dashboard.html'; }
      hideLoading();
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + (t === 'photo' ? 'photo' : 'info')).classList.add('active');
    }
    function viewFile(id) { if(pdfData[id]) window.open(pdfData[id], '_blank'); }
    function showLoading(t) { document.getElementById('loadText').innerText = t; document.getElementById('upLoading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('upLoading').style.display = 'none'; }
    window.onload = init;
  </script>
</body>
</html>
