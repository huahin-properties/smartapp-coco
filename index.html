<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>CoCo Hua Hin 88 | Official Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #2D5A27; --bg: #F8FAF8; --gold: #CEA86C; --text: #1A3017; --border: rgba(45, 90, 39, 0.1); --row-h: 85px; --thumb-w: 110px; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

    header { position: fixed; top: 0; width: 100%; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); }
    .hero { padding: 75px 20px 10px; text-align: center; }
    .search-input { width: 100%; max-width: 550px; background: #FFFFFF; border: 1.5px solid var(--brand); border-radius: 50px; padding: 10px 15px 10px 40px; color: var(--text); font-weight: 600; outline: none; margin: 0 auto 10px; display: block; box-shadow: 0 4px 10px rgba(45, 90, 39, 0.05); }
    
    .pill-container { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; padding-bottom: 10px; }
    .pill { padding: 7px 14px; border-radius: 50px; background: #FFF; border: 1px solid var(--border); color: #6B7A68; font-size: 0.62rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
    .pill.active { background: var(--brand); color: #FFF; border-color: var(--brand); }

    .collections-bar { display: flex; justify-content: space-between; padding: 15px 20px; border-top: 1px solid var(--border); max-width: 1120px; margin: 10px auto 0; }
    .prop-list { padding: 0 20px 40px; display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 1120px; margin: 0 auto; }
    
    .card { background: #FFFFFF; border: 1px solid var(--border); border-radius: 12px; display: flex; height: var(--row-h); overflow: hidden; text-decoration: none; color: inherit; transition: 0.2s; }
    .card-img { width: var(--thumb-w); flex-shrink: 0; position: relative; background: #eee; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .hp-id { position: absolute; top: 4px; left: 6px; font-size: 0.45rem; color: #FFF; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; font-weight: 800; }
    
    .card-info { flex: 1; padding: 5px 12px; display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; }
    .prop-name { font-size: 0.85rem; font-weight: 700; color: var(--brand); }
    .price-new { font-size: 1rem; font-weight: 800; color: var(--brand); }
    .status-tag { font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--brand); color: var(--brand); font-weight: 800; text-transform: uppercase; width: fit-content; }
    .admin-float { position: fixed; bottom: 25px; right: 20px; width: 45px; height: 45px; background: var(--brand); border: 2px solid #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FFF; z-index: 9999; box-shadow: 0 10px 25px rgba(45, 90, 39, 0.3); }

    @media (min-width: 768px) { :root { --row-h: 100px; --thumb-w: 160px; } .prop-list { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

  <header>
    <div style="color:var(--brand); font-weight:800; letter-spacing:1px;">COCO HUA HIN 88 <span style="font-weight:300; color:#6B7A68;">LUXURY</span></div>
  </header>

  <section class="hero">
    <input type="text" id="sI" class="search-input" placeholder="Search Plot Number..." onkeyup="filterData()">
    <div class="pill-container" id="pillBox">
      <div class="pill active" data-f="all">All Units</div>
      <div class="pill" data-f="Ready to Move In">Ready</div>
      <div class="pill" data-f="Under Construction">Building</div>
    </div>
  </section>

  <div class="collections-bar">
    <h2 style="font-size:0.8rem; color:var(--brand); font-weight:800;">COLLECTIONS</h2>
    <span id="unitCount" style="font-size:0.65rem; color:#6B7A68; font-weight:700;">-</span>
  </div>

  <main class="prop-list" id="propGrid"></main>

  <a href="gateway.html" class="admin-float"><i class="fas fa-key"></i></a>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const PROJECT_NAME = "CoCo Hua Hin 88"; 
    let masterData = [];

    async function init() {
      // 1. Instant View: โหลดจาก Cache ทันที (Spec 3)
      const cache = localStorage.getItem('cache_coco_idx');
      if(cache) { masterData = JSON.parse(cache); render(masterData); }

      try {
        const res = await fetch(`${API}?mode=getListSmall`);
        const json = await res.json();
        
        // 2. Strict Lockdown: กรองเฉพาะ CoCo 100% (Spec 1)
        masterData = json.filter(u => u.Project_Name === PROJECT_NAME && u.System_Status === "Online");
        
        // 3. Update Cache
        localStorage.setItem('cache_coco_idx', JSON.stringify(masterData));
        render(masterData);
      } catch (e) { console.error("Sync Failed"); }
    }

    function render(list) {
      document.getElementById('unitCount').textContent = `${list.length} UNITS`;
      document.getElementById('propGrid').innerHTML = list.map(u => `
        <a href="details.html?id=${u.HP_ID}" class="card">
          <div class="card-img">
            <span class="hp-id">${u.HP_ID}</span>
            <img src="${u.Thumbnail_Image || 'https://via.placeholder.com/400x250?text=No+Image'}" 
                 loading="lazy" 
                 onerror="this.src='https://via.placeholder.com/400x250?text=Error'">
          </div>
          <div class="card-info">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
              <div class="prop-name">Plot ${u.Plot || '-'}</div>
              <div style="font-size:0.5rem; color:var(--gold); font-weight:800;">${u.Badge || ''}</div>
            </div>
            <div style="font-size:0.6rem; color:#6B7A68; font-weight:600;">${u.Bedrooms || 0} Bed | ${u.Living_Area_sq_m || 0} m²</div>
            <div class="price-new">฿${(Number(u.Sale_Price)||0).toLocaleString()}</div>
            <div class="status-tag">${u.Status || '-'}</div>
          </div>
        </a>`).join('');
    }

    function filterData() {
      const q = document.getElementById('sI').value.toLowerCase();
      const pill = document.querySelector('.pill.active').dataset.f;
      const filtered = masterData.filter(u => 
        (!q || String(u.Plot).toLowerCase().includes(q)) &&
        (pill === 'all' || u.Build_Stage === pill)
      );
      render(filtered);
    }

    document.getElementById('pillBox').addEventListener('click', (e) => {
      if (e.target.classList.contains('pill')) {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        e.target.classList.add('active');
        filterData();
      }
    });

    window.onload = init;
  </script>
</body>
</html>
