<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>CoCo Catalog | HUA HIN PROPERTIES</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* สไตล์เหมือนเดิมเป๊ะ 100% เพื่อความต่อเนื่อง */
    :root { --navy: #0B1829; --navy-dark: #060F1A; --gold: #C9A84C; --white: #FDFAF5; --border: rgba(255, 255, 255, 0.08); --row-h: 80px; --thumb-w: 105px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--navy-dark); color: var(--white); font-family: 'Montserrat', sans-serif; }
    header { position: fixed; top: 0; width: 100%; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: rgba(6, 15, 26, 0.95); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); }
    .hero { padding: 75px 15px 10px; text-align: center; }
    .search-input { width: 100%; background: #FFFFFF; border: 1px solid var(--gold); border-radius: 50px; padding: 10px 40px; color: #0B1829; font-weight: 600; outline: none; }
    .prop-list { padding: 12px; display: grid; grid-template-columns: 1fr; gap: 8px; }
    .card { background: rgba(11, 24, 41, 0.9); border: 1px solid var(--border); border-radius: 12px; display: flex; height: var(--row-h); overflow: hidden; text-decoration: none; color: inherit; }
    .card-img { width: var(--thumb-w); flex-shrink: 0; position: relative; background: #000; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .admin-link { color: var(--gold); font-size: 1.2rem; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <a href="#" style="color:var(--gold); font-weight:800; text-decoration:none;">COCO CHALET</a>
    <div id="adminGateBtn" class="admin-link"><i class="fas fa-user-circle"></i></div>
  </header>

  <section class="hero">
    <input type="text" id="sI" class="search-input" placeholder="Search Plot in CoCo..." onkeyup="f()">
  </section>

  <main class="prop-list" id="propGrid"></main>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let data = [];

    // 🎯 ฟังก์ชันเช็กสิทธิ์หน้า CoCo: ถ้าเป็น All หรือ CoCo ถึงจะเห็น Logout
    function checkAuthUI() {
      const btn = document.getElementById('adminGateBtn');
      const isLoggedIn = localStorage.getItem('admin_session') === 'active';
      const userProject = localStorage.getItem('admin_project');

      if (isLoggedIn && (userProject === 'CoCo' || userProject === 'All')) {
        btn.innerHTML = '<i class="fas fa-sign-out-alt"></i>';
        btn.onclick = () => {
          if(confirm("ออกจากระบบ CoCo?")) { localStorage.clear(); location.reload(); }
        };
      } else {
        btn.innerHTML = '<i class="fas fa-user-circle"></i>';
        btn.onclick = () => { window.location.href = 'gateway.html'; };
      }
    }

    async function init() {
      checkAuthUI();
      try {
        const res = await fetch(`${API}?mode=getListSmall&project=CoCo`); // ดึงเฉพาะของ CoCo
        data = await res.json();
        f();
      } catch (err) { console.error(err); }
    }

    function f() {
      const q = document.getElementById('sI').value.toLowerCase();
      let res = data.filter(u => !q || `${u.HP_ID} ${u.Plot}`.toLowerCase().includes(q));
      render(res);
    }

    function render(res) {
      document.getElementById('propGrid').innerHTML = res.map(u => `
        <a href="details.html?id=${u.HP_ID}" class="card">
          <div class="card-img"><img src="${u.Thumbnail_Image || ''}"></div>
          <div class="card-info" style="padding:10px;">
            <div style="font-weight:800;">Plot: ${u.Plot}</div>
            <div style="color:var(--gold);">฿${(u.Sale_Price || 0).toLocaleString()}</div>
          </div>
        </a>`).join('');
    }

    window.onload = init;
  </script>
</body>
</html>
