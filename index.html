<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>CoCo Hua Hin 88 | Catalog V1.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #2D5A27; --bg: #F8FAF8; --gold: #CEA86C; --text: #1A3017; --border: rgba(45, 90, 39, 0.1); --row-h: 85px; --thumb-w: 110px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
    header { position: fixed; top: 0; width: 100%; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); }
    .hero { padding: 75px 20px 10px; text-align: center; }
    .search-input { width: 100%; max-width: 550px; background: #FFFFFF; border: 1.5px solid var(--brand); border-radius: 50px; padding: 10px 15px 10px 40px; color: var(--text); font-weight: 600; outline: none; margin: 0 auto 10px; display: block; box-shadow: 0 4px 10px rgba(45, 90, 39, 0.05); }
    .prop-list { padding: 0 20px 40px; display: grid; grid-template-columns: 1fr; gap: 12px; max-width: 1120px; margin: 0 auto; }
    .card { background: #FFFFFF; border: 1px solid var(--border); border-radius: 12px; display: flex; height: var(--row-h); overflow: hidden; text-decoration: none; color: inherit; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .card-img { width: var(--thumb-w); flex-shrink: 0; position: relative; background: #eee; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    @media (min-width: 768px) { :root { --row-h: 100px; --thumb-w: 160px; } .prop-list { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header><div style="color:var(--brand); font-weight:800; letter-spacing:1px;">COCO HUA HIN 88 <span style="font-weight:300;">LUXURY</span></div></header>

  <section class="hero">
    <input type="text" id="sI" class="search-input" placeholder="Search Plot Number..." onkeyup="f()">
  </section>

  <main class="prop-list" id="propGrid"></main>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const L_PROJECT = "CoCo Hua Hin 88";
    let d = [];

    async function init() {
      // ✅ 1. Instant View 0.1s (Spec 3)
      const c = localStorage.getItem('cache_coco_v1_5');
      if(c) { d = JSON.parse(c); r(d); }

      try {
        const res = await fetch(`${API}?mode=getListSmall`);
        const j = await res.json();
        // ✅ 2. Lockdown CoCo & Online Only (Spec 1)
        d = j.filter(u => u.Project_Name === L_PROJECT && u.System_Status === "Online");
        
        localStorage.setItem('cache_coco_v1_5', JSON.stringify(d));
        r(d);
      } catch (e) { console.error("Sync Err"); }
    }

    function r(list) {
      document.getElementById('propGrid').innerHTML = list.map(u => {
        // ✅ 3. FIX: จัดการลิงก์รูปภาพให้เป็น Direct Link 100%
        const t = u.Thumbnail_Image || 'https://via.placeholder.com/400x250?text=No+Image';
        return `
        <a href="details.html?id=${u.HP_ID}" class="card">
          <div class="card-img">
            <img src="${t}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x250?text=Error'">
          </div>
          <div class="card-info" style="flex:1; padding:10px;">
            <div style="font-weight:800; color:var(--brand);">Plot ${u.Plot || '-'}</div>
            <div style="font-size:1.1rem; font-weight:800; color:var(--brand);">฿${(Number(u.Sale_Price)||0).toLocaleString()}</div>
            <div style="font-size:0.6rem; color:#6B7A68;">${u.Bedrooms} Bed | ${u.Living_Area_sq_m} m²</div>
          </div>
        </a>`;
      }).join('');
    }

    function f() {
      const q = document.getElementById('sI').value.toLowerCase();
      r(d.filter(u => !q || String(u.Plot).toLowerCase().includes(q)));
    }
    window.onload = init;
  </script>
</body>
</html>
