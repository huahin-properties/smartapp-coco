<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>CoCo Hua Hin 88 | LUXURY CATALOG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --coco: #2D5A27; --gold: #CEA86C; --white: #FFFFFF; --bg: #F8FAF8; --border: rgba(45, 90, 39, 0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); font-family: 'Montserrat', sans-serif; color: #1A3017; overflow-x: hidden; }
    
    /* Splash Screen ตามมาตรฐาน Master Core */
    #pageSplash { position: fixed; inset: 0; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.4s; }
    .splash-brand { color: var(--coco); font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

    header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .brand-title { font-family: 'Playfair Display', serif; color: var(--coco); font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px; }

    .hero-search { padding: 90px 20px 30px; text-align: center; max-width: 800px; margin: 0 auto; }
    .search-box { position: relative; width: 100%; }
    .search-input { width: 100%; background: var(--white); border: 1.5px solid var(--coco); border-radius: 50px; padding: 16px 25px 16px 50px; outline: none; font-weight: 600; color: var(--coco); box-shadow: 0 10px 30px rgba(45, 90, 39, 0.04); transition: 0.3s; }
    .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--coco); opacity: 0.5; }

    /* Pill System ครบ 4 เมนู */
    .pill-container { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; padding: 0 20px 20px; max-width: 600px; margin: 0 auto; }
    .pill { white-space: nowrap; padding: 8px 16px; border-radius: 50px; background: #FFF; border: 1px solid var(--border); color: #6B7A68; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
    .pill.active { background: var(--coco); color: #FFF; border-color: var(--coco); box-shadow: 0 5px 15px rgba(45, 90, 39, 0.2); }

    /* High-Speed Inventory Grid */
    .inventory-grid { padding: 0 20px 100px; display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .prop-card { background: var(--white); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.02); }
    .prop-card:active { transform: scale(0.98); }
    
    .img-wrap { position: relative; width: 100%; aspect-ratio: 16/10; background: #f0f0f0; }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .status-tag { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.95); padding: 5px 12px; border-radius: 50px; font-size: 9px; font-weight: 800; color: var(--coco); text-transform: uppercase; }
    .badge-tag { position: absolute; top: 15px; right: 15px; background: var(--gold); color: white; padding: 5px 12px; border-radius: 50px; font-size: 9px; font-weight: 800; text-transform: uppercase; }

    .info-wrap { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
    .price { font-size: 1.4rem; font-weight: 800; color: var(--coco); }
    .spec-line { display: flex; gap: 15px; border-top: 1px solid #f5f5f5; padding-top: 15px; margin-top: 5px; }
    .spec-item { font-size: 0.7rem; font-weight: 600; color: #6B7A68; display: flex; align-items: center; gap: 6px; }

    .admin-float { position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px; background: var(--coco); border: 2px solid #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FFF; z-index: 999; box-shadow: 0 10px 25px rgba(45, 90, 39, 0.3); }

    @media (min-width: 768px) { .inventory-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .inventory-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>
  <div id="pageSplash"><div class="splash-brand italic">COCO HUA HIN 88</div></div>
  <header><div class="brand-title">COCO HUA HIN 88</div><i class="fas fa-bars text-coco opacity-20"></i></header>

  <div class="hero-search">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="sI" class="search-input" placeholder="Search Plot or ID..." onkeyup="filterLocal()">
    </div>
  </div>

  <div class="pill-container" id="pillBox">
    <div class="pill active" data-f="all">ALL UNITS</div>
    <div class="pill" data-f="Ready to Move In">READY</div>
    <div class="pill" data-f="Under Construction">BUILDING</div>
    <div class="pill" data-f="Land & Build to Order">PLOTS</div>
  </div>

  <main class="inventory-grid" id="propGrid"></main>

  <a href="gateway.html" class="admin-float"><i class="fas fa-key"></i></a>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const L_PROJECT = "CoCo Hua Hin 88"; // 🎯 LOCKDOWN TARGET
    let cocoData = [];

    async function init() {
      // ✅ 1. Instant View จาก Cache ตามสเปค Master
      const cache = localStorage.getItem('cache_coco_v4_1');
      if (cache) { cocoData = JSON.parse(cache); render(cocoData); hideSplash(); }

      try {
        const res = await fetch(`${API}?mode=getListSmall`);
        const all = await res.json();
        
        // ✅ 2. Lockdown Logic: กรองเฉพาะ Coco และ Online เท่านั้น
        cocoData = all.filter(u => u.Project_Name === L_PROJECT && u.System_Status === "Online");

        // ✅ 3. Update Cache & Render
        localStorage.setItem('cache_coco_v4_1', JSON.stringify(cocoData));
        render(cocoData);
      } catch (e) { console.error("Sync Error"); }
      finally { hideSplash(); }
    }

    function render(list) {
      const grid = document.getElementById('propGrid');
      if (!list.length) { grid.innerHTML = `<div class="col-span-full text-center py-20 opacity-30">No Assets Found.</div>`; return; }

      grid.innerHTML = list.map(u => `
        <a href="details.html?id=${u.HP_ID}" class="prop-card">
          <div class="img-wrap">
            <span class="status-tag">${u.Status || 'Available'}</span>
            ${u.Badge ? `<span class="badge-tag">${u.Badge}</span>` : ''}
            <img src="${u.Thumbnail_Image || 'https://via.placeholder.com/600x400?text=Syncing...'}" 
                 loading="lazy" 
                 onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
          </div>
          <div class="info-wrap">
            <div style="font-size:0.7rem; color:var(--gold); font-weight:800; letter-spacing:1px;">PLOT ${u.Plot || '-'} • ${u.HP_ID}</div>
            <div class="brand-title" style="font-size: 1.2rem; margin: 3px 0;">The Luxury Pool Villa</div>
            <div class="price">฿${(Number(u.Sale_Price)||0).toLocaleString()}</div>
            <div class="spec-line">
              <div class="spec-item"><i class="fas fa-bed"></i> ${u.Bedrooms || 0} Bed</div>
              <div class="spec-item"><i class="fas fa-bath"></i> ${u.Bathrooms || 0} Bath</div>
              <div class="spec-item"><i class="fas fa-maximize"></i> ${u.Living_Area_sq_m || 0} m²</div>
            </div>
          </div>
        </a>`).join('');
    }

    function filterLocal() {
      const q = document.getElementById('sI').value.toLowerCase();
      const pill = document.querySelector('.pill.active').dataset.f;
      const filtered = cocoData.filter(u => 
        (!q || String(u.Plot).toLowerCase().includes(q) || u.HP_ID.toLowerCase().includes(q)) &&
        (pill === 'all' || u.Build_Stage === pill)
      );
      render(filtered);
    }

    document.getElementById('pillBox').addEventListener('click', (e) => {
      if (e.target.classList.contains('pill')) {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        e.target.classList.add('active');
        filterLocal();
      }
    });

    function hideSplash() { const s = document.getElementById('pageSplash'); if(s) { s.style.opacity='0'; setTimeout(()=>s.style.display='none', 400); } }
    window.onload = init;
  </script>
</body>
</html>
